<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flashcards</title>
    <script src="https://cdn.jsdelivr.net/npm/pouchdb@8.0.1/dist/pouchdb.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pouchdb-find@8.0.1/dist/pouchdb.find.min.js"></script>
</head>
<body>

    <header class="top-nav">
        <div class="nav-left">
            <h2 id="breadcrumb-trail">
                <span class="crumb" onclick="goHome()">Home</span>
            </h2>
        </div>
        </header>

    <main id="app-container">
        </main>

    <div id="card-modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="modal-title">Add New Card</h2>
            <textarea id="modal-q" placeholder="Question (Multi-line supported)"></textarea>
            <textarea id="modal-a" placeholder="Answer (Multi-line supported)"></textarea>
            <div class="modal-actions">
                <button id="modal-cancel">Cancel</button>
                <button id="modal-save" class="primary-btn">Save</button>
            </div>
        </div>
    </div>
    
    <script src="src/database.js"></script>
    <script src="src/app.js"></script>
</body>
</html>
